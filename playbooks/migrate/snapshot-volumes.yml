---
- name: Snapshot approved migration data volumes
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Load approved manifest
      ansible.builtin.import_tasks: tasks/load-approved-manifest.yml

    - name: Create snapshots for approved data volumes
      amazon.aws.ec2_snapshot:
        region: "{{ aws_region | trim }}"
        volume_id: "{{ item.volume_id }}"
        description: "RHEL migration {{ migration_id }} {{ snapshot_label | default('phase-4') }} snapshot for {{ item.mount_point | default(item.volume_id) }}"
        wait: "{{ snapshot_wait | default(false) | bool }}"
        wait_timeout: "{{ snapshot_wait_timeout | default(1200) }}"
        snapshot_tags:
          MigrationId: "{{ migration_id }}"
          Phase: "phase-4-migrate"
          SnapshotLabel: "{{ snapshot_label | default('phase-4') }}"
          SourceInstanceId: "{{ migration_manifest.source.instance_id | default('') }}"
          SourceVolumeId: "{{ item.volume_id }}"
          MountPoint: "{{ item.mount_point | default('unknown') }}"
          CutoverFinal: "false"
      loop: "{{ migration_manifest.data_volumes | default([]) }}"
      register: migration_snapshot_results
      when: migration_manifest.data_volumes | default([]) | length > 0

    - name: Build snapshot report
      ansible.builtin.set_fact:
        migration_snapshot_report:
          metadata:
            migration_id: "{{ migration_id }}"
            phase: phase-4-migrate
            action: snapshot-volumes
            git_commit_sha: "{{ scm_revision | default('unknown') }}"
            ansible_version: "{{ ansible_version.full | default('unknown') }}"
            completed_at: "{{ ansible_date_time.iso8601 }}"
            result: success
          manifest_source: "{{ migration_manifest_source }}"
          source_instance_id: "{{ migration_manifest.source.instance_id | default('') }}"
          data_volumes: "{{ migration_manifest.data_volumes | default([]) }}"
          snapshot_results: "{{ migration_snapshot_results.results | default([]) }}"

    - name: Upload snapshot report to S3
      amazon.aws.s3_object:
        bucket: "{{ artifact_bucket | trim }}"
        object: "{{ migration_artifact_prefix }}/phase-4-migrate/snapshots/{{ migration_timestamp }}-snapshot-report.yml"
        content: "{{ migration_snapshot_report | to_nice_yaml(indent=2, sort_keys=false) }}"
        mode: put
        region: "{{ aws_region | trim }}"
        encrypt: true
        encryption_mode: "{{ 'aws:kms' if migration_artifact_kms_key_id is defined else omit }}"
        encryption_kms_key_id: "{{ migration_artifact_kms_key_id | default(omit) }}"
      when: migration_upload_to_s3 | default(true) | bool
