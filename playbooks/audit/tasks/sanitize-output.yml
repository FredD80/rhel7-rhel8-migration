---
- name: Build sanitized audit output
  ansible.builtin.set_fact:
    audit_sanitized_output:
      metadata:
        migration_id: "{{ audit_context.migration_id }}"
        phase: phase-2-audit
        aap_job_id: "{{ tower_job_id | default(awx_job_id | default('unknown')) }}"
        aap_workflow_id: "{{ tower_workflow_job_id | default(awx_workflow_job_id | default('unknown')) }}"
        git_repository_url: "{{ scm_url | default('unknown') }}"
        git_branch: "{{ scm_branch | default('unknown') }}"
        git_commit_sha: "{{ scm_revision | default('unknown') }}"
        execution_environment_image: "{{ ansible_execution_environment_image | default('unknown') }}"
        execution_environment_digest: "{{ ansible_execution_environment_image_digest | default('unknown') }}"
        ansible_version: "{{ ansible_version.full | default('unknown') }}"
        started_at: "{{ audit_context.timestamp }}"
        completed_at: "{{ ansible_date_time.iso8601 }}"
        result: proposed_manifest_generated
      audit_context: "{{ audit_context }}"
      capture_status:
        host_os: "{{ 'present' if audit_host_os is defined else 'missing' }}"
        identities: "{{ 'present' if audit_identities is defined else 'missing' }}"
        runtime: "{{ 'present' if audit_runtime is defined else 'missing' }}"
        filesystem: "{{ 'present' if audit_filesystem is defined else 'missing' }}"
        security: "{{ 'present' if audit_security is defined else 'missing' }}"
        ssh: "{{ 'present' if audit_ssh is defined else 'missing' }}"
        network: "{{ 'present' if audit_network is defined else 'missing' }}"
        aws: "{{ 'present' if audit_aws is defined else 'missing' }}"
      host_os: "{{ audit_host_os | default({}) }}"
      identities: "{{ audit_identities | default({}) }}"
      runtime: "{{ audit_runtime | default({}) }}"
      filesystem: "{{ audit_filesystem | default({}) }}"
      security: "{{ audit_security | default({}) }}"
      ssh: "{{ audit_ssh | default({}) }}"
      network: "{{ audit_network | default({}) }}"
      aws: "{{ audit_aws | default({}) }}"
      proposed_manifest: "{{ audit_proposed_manifest | default({}) }}"
      sanitization_notes:
        - Private keys, password hashes, keytabs, API tokens, and credential bodies are not intentionally copied by this audit.
        - Authorized keys and known-hosts are represented by fingerprints and metadata.
        - Some command output can contain host-specific operational data; keep S3 prefix access restricted.

- name: Create local audit artifact directory on controller
  ansible.builtin.tempfile:
    state: directory
    prefix: "rhel-migration-audit-{{ audit_context.migration_id }}-"
  register: audit_local_artifact_dir
  delegate_to: localhost
  become: false
  run_once: true

- name: Write sanitized audit artifact locally
  ansible.builtin.copy:
    dest: "{{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-sanitized.yml"
    mode: "0600"
    content: "{{ audit_sanitized_output | to_nice_yaml(indent=2, sort_keys=false) }}"
  delegate_to: localhost
  become: false

- name: Write proposed manifest locally
  ansible.builtin.copy:
    dest: "{{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-proposed.yml"
    mode: "0600"
    content: "{{ audit_proposed_manifest | to_nice_yaml(indent=2, sort_keys=false) }}"
  delegate_to: localhost
  become: false

- name: Upload sanitized audit artifact to S3
  amazon.aws.s3_object:
    bucket: "{{ audit_context.artifact_bucket }}"
    object: "{{ audit_context.sanitized_audit_key }}/{{ audit_context.timestamp }}-sanitized.yml"
    src: "{{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-sanitized.yml"
    mode: put
    region: "{{ audit_context.aws_region }}"
  delegate_to: localhost
  become: false
  when: audit_upload_to_s3 | default(true) | bool

- name: Upload proposed manifest to S3
  amazon.aws.s3_object:
    bucket: "{{ audit_context.artifact_bucket }}"
    object: "{{ audit_context.proposed_manifest_key }}/{{ audit_context.timestamp }}-proposed.yml"
    src: "{{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-proposed.yml"
    mode: put
    region: "{{ audit_context.aws_region }}"
  delegate_to: localhost
  become: false
  when: audit_upload_to_s3 | default(true) | bool

- name: Show generated audit artifact locations
  ansible.builtin.debug:
    msg:
      - "Local sanitized audit: {{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-sanitized.yml"
      - "Local proposed manifest: {{ audit_local_artifact_dir.path }}/{{ audit_context.timestamp }}-proposed.yml"
      - "S3 sanitized audit: s3://{{ audit_context.artifact_bucket }}/{{ audit_context.sanitized_audit_key }}/{{ audit_context.timestamp }}-sanitized.yml"
      - "S3 proposed manifest: s3://{{ audit_context.artifact_bucket }}/{{ audit_context.proposed_manifest_key }}/{{ audit_context.timestamp }}-proposed.yml"
