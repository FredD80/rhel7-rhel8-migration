---
- name: Capture local and NSS identity commands
  ansible.builtin.command: "{{ item.command }}"
  loop:
    - key: local_passwd
      command: "awk -F: '{print $1\"|\"$3\"|\"$4\"|\"$5\"|\"$6\"|\"$7}' /etc/passwd"
    - key: local_group
      command: "awk -F: '{print $1\"|\"$3\"|\"$4}' /etc/group"
    - key: nss_passwd
      command: getent passwd
    - key: nss_group
      command: getent group
    - key: duplicate_uids
      command: "awk -F: '{count[$3]++; names[$3]=names[$3]\",\"$1} END {for (uid in count) if (count[uid] > 1) print uid names[uid]}' /etc/passwd"
    - key: duplicate_gids
      command: "awk -F: '{count[$3]++; names[$3]=names[$3]\",\"$1} END {for (gid in count) if (count[gid] > 1) print gid names[gid]}' /etc/group"
    - key: interactive_accounts
      command: "awk -F: '$7 !~ /(nologin|false|shutdown|halt|sync)$/ {print $1\"|\"$3\"|\"$4\"|\"$6\"|\"$7}' /etc/passwd"
  register: audit_identity_commands
  changed_when: false
  failed_when: false

- name: Find sudoers files
  ansible.builtin.find:
    paths:
      - /etc/sudoers.d
    file_type: file
    hidden: true
  register: audit_sudoers_d_files
  failed_when: false
  changed_when: false

- name: Stat sudoers and home directories
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '{print $1"|"$3"|"$4"|"$6"|"$7}' /etc/passwd | while IFS='|' read -r name uid gid home shell; do
      if [ -n "$home" ] && [ -e "$home" ]; then
        stat -c '%n|%U|%G|%a|%s|%Y' "$home"
      else
        printf '%s|missing|missing|missing|0|0\n' "$home"
      fi
    done
  args:
    executable: /bin/bash
  register: audit_home_directory_stats
  changed_when: false
  failed_when: false

- name: Capture service account references from unit files
  ansible.builtin.shell: |
    grep -RHE '^[[:space:]]*(User|Group|SupplementaryGroups|DynamicUser)=' /etc/systemd/system /usr/lib/systemd/system 2>/dev/null || true
  register: audit_service_account_references
  changed_when: false
  failed_when: false

- name: Store users, groups, and service account audit data
  ansible.builtin.set_fact:
    audit_identities:
      commands: "{{ audit_identity_commands.results | default([]) }}"
      sudoers_file: /etc/sudoers
      sudoers_d_files: "{{ audit_sudoers_d_files.files | default([]) }}"
      home_directory_stats: "{{ audit_home_directory_stats.stdout_lines | default([]) }}"
      service_account_references: "{{ audit_service_account_references.stdout_lines | default([]) }}"
