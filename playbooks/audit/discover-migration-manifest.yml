---
- name: Discover RHEL 7 migration manifest inputs
  hosts: "{{ rhel7_source_host }}"
  become: true
  gather_facts: true
  vars_prompt:
    - name: migration_id
      prompt: "Migration ID"
      private: false

    - name: rhel7_source_host
      prompt: "RHEL 7 source inventory host or group"
      private: false

    - name: artifact_bucket
      prompt: "S3 artifact bucket name"
      private: false

    - name: aws_region
      prompt: "AWS region"
      private: false

    - name: cutover_strategies
      prompt: "Requested cutover strategies (comma-separated: dns,eip,lb,secondary_ip)"
      private: false
      default: "dns"

  vars:
    allowed_cutover_strategies:
      - dns
      - eip
      - lb
      - secondary_ip

  pre_tasks:
    - name: Normalize requested cutover strategies
      ansible.builtin.set_fact:
        requested_cutover_strategies: >-
          {{
            (['dns'] + (cutover_strategies | trim | lower | regex_replace('\\s+', '')).split(','))
            | reject('equalto', '')
            | unique
            | list
          }}

    - name: Validate mandatory audit inputs
      ansible.builtin.assert:
        that:
          - migration_id is defined
          - rhel7_source_host is defined
          - artifact_bucket is defined
          - aws_region is defined
          - cutover_strategies is defined
          - migration_id | trim | length > 0
          - rhel7_source_host | trim | length > 0
          - artifact_bucket | trim | length > 0
          - aws_region | trim | length > 0
          - requested_cutover_strategies | length > 0
          - requested_cutover_strategies | difference(allowed_cutover_strategies) | length == 0
          - "'/' not in migration_id"
          - "' ' not in migration_id"
          - "'/' not in artifact_bucket"
        fail_msg: "Required audit inputs: migration_id, rhel7_source_host, artifact_bucket, aws_region, and cutover_strategies."

    - name: Set audit artifact context
      ansible.builtin.set_fact:
        audit_context:
          migration_id: "{{ migration_id | trim }}"
          rhel7_source_host: "{{ rhel7_source_host | trim }}"
          artifact_bucket: "{{ artifact_bucket | trim }}"
          aws_region: "{{ aws_region | trim }}"
          requested_cutover_strategies: "{{ requested_cutover_strategies }}"
          detected_cutover_strategies: []
          effective_cutover_strategies: "{{ requested_cutover_strategies }}"
          s3_base_prefix: "rhel-migration/{{ migration_id | trim }}"
          sanitized_audit_key: "rhel-migration/{{ migration_id | trim }}/phase-2-audit/sanitized"
          proposed_manifest_key: "rhel-migration/{{ migration_id | trim }}/manifest/proposed"

    - name: Show audit artifact destination
      ansible.builtin.debug:
        msg:
          - "Migration ID: {{ audit_context.migration_id }}"
          - "Source host pattern: {{ audit_context.rhel7_source_host }}"
          - "S3 artifact location: s3://{{ audit_context.artifact_bucket }}/{{ audit_context.s3_base_prefix }}/"
          - "AWS region: {{ audit_context.aws_region }}"
          - "Requested cutover strategies: {{ audit_context.requested_cutover_strategies | join(',') }}"

  tasks:
    - name: Capture host and OS baseline
      ansible.builtin.import_tasks: tasks/host-os-baseline.yml

    - name: Capture users, groups, and service accounts
      ansible.builtin.import_tasks: tasks/users-groups-service-accounts.yml

    - name: Capture services, schedules, and runtime state
      ansible.builtin.import_tasks: tasks/services-schedules-runtime.yml

    - name: Capture filesystem and application paths
      ansible.builtin.import_tasks: tasks/filesystem-application-paths.yml

    - name: Capture security settings
      ansible.builtin.import_tasks: tasks/security-settings.yml

    - name: Capture SSH key material safely
      ansible.builtin.import_tasks: tasks/ssh-key-material.yml

    - name: Capture network dependencies
      ansible.builtin.import_tasks: tasks/network-dependencies.yml

    - name: Capture AWS metadata
      ansible.builtin.import_tasks: tasks/aws-captures.yml

    - name: Build proposed manifest
      ansible.builtin.import_tasks: tasks/proposed-manifest.yml

    - name: Sanitize audit output
      ansible.builtin.import_tasks: tasks/sanitize-output.yml
